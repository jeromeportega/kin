# kin filter configuration. Copy this to `kin.toml` and edit for your
# household. `kin.toml` is gitignored — only this example is tracked.

[filters]

# Senders whose mail should always be classified.
# Full address: "admin@sunshinedaycare.example"
# Whole domain:  "@delta.com"  (matches anything @delta.com OR @*.delta.com,
#                e.g. matches alerts@notify.delta.com)
sender_allowlist = [
    "admin@sunshinedaycare.example",
    "@delta.com",
    "@riversidepeds.example",
]

# Senders to skip entirely, even if they would otherwise match.
# Use this for noisy newsletters or marketing that slips through Gmail.
sender_blocklist = []

# If the sender doesn't match the allowlist, the email is classified
# when one of these terms appears in the subject (case-insensitive).
subject_keywords = [
    "daycare",
    "pediatrician",
    "appointment",
    "reservation",
    "bill",
    "due",
    "school",
    "receipt",
]

# Same as above, matched against the body. Leave empty if subject is enough.
body_keywords = []
